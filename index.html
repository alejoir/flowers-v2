<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌻 Sunflower Engineering Protocol | Edición Familiar</title>
    <style>
        /* Estética de Terminal de Ingeniería Inicial (Oscuro) */
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #0f0; transition: background 2s ease; }
        canvas { display: block; }

        /* Capa de Telemetría */
        #terminal-ui {
            position: absolute; top: 15px; left: 15px; background: rgba(0, 20, 0, 0.7);
            padding: 10px; border: 1px solid #0f0; z-index: 100; font-size: 11px; pointer-events: none;
        }

        /* Panel de Autenticación (UI Central) */
        #auth-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 30, 0, 0.9); border: 2px solid #0f0; padding: 25px;
            text-align: center; z-index: 200; box-shadow: 0 0 15px #0f0; border-radius: 8px;
        }
        input {
            background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px;
            margin: 10px 0; width: 80%; text-align: center; font-family: 'Courier New', monospace;
        }
        button {
            background: #0f0; color: #000; border: none; padding: 10px 18px;
            cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px;
        }
        button:hover { background: #0a0; }

        /* Cuadro de Mensaje Emergente (Se ajusta al azul) */
        #display-message {
            position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 550px; background: rgba(255, 255, 255, 0.95);
            color: #052205; padding: 20px; border-radius: 12px; font-family: 'Georgia', serif;
            display: none; z-index: 150; box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            text-align: center; font-size: 1.05rem; line-height: 1.5; opacity: 0; transition: opacity 1s ease;
        }
        .close-btn { color: red; cursor: pointer; float: right; font-weight: bold; margin-bottom: 10px;}

        /* Estado del cuerpo al abrirse (Azul) */
        body.access-granted { background: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%); }
    </style>
</head>
<body>

    <div id="terminal-ui">
        <div>> NODE: ECUADOR_SECURE_GATE</div>
        <div>> PROTOCOL: TLS_GIRASOL_DESPLIEGUE_V4</div>
        <div>> STATUS: WAITING_AUTH...</div>
    </div>

    <div id="auth-panel" id="login">
        <h3>🔐 SISTEMA DE ACCESO RESTRINGIDO</h3>
        <p>Introduce tu llave criptográfica:</p>
        <input type="password" id="passInput" placeholder="LLAVE">
        <br>
        <button onclick="checkAccess()">VERIFICAR LLAVE</button>
        <p id="error-msg" style="color: red; font-size: 10px; margin-top: 10px; display: none;">LLAVE INCORRECTA - ACCESO DENEGADO</p>
    </div>

    <div id="display-message">
        <span class="close-btn" onclick="resetView()">[X] CERRAR</span>
        <div id="text-content"></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==========================================
        // SECCIÓN DE MENSAJES DE INGENIERÍA (MODIFICA AQUÍ)
        // ==========================================
        const CONFIG = {
            mama: {
                pass: "gracie", // LLAVE DE MAMÁ (NO TOCAR)
                msg: "Mami querida Gracie, acceso concedido. Gracias por todo tu amor. Estos girasoles son para ti. ¡Te quiero!", // ESCRIBE TU MENSAJE REAL AQUÍ
                bouquetX: -12,
                blueFog: 0x1e3c72
            },
            hermana: {
                pass: "brigitte", // LLAVE DE HERMANA (NO TOCAR)
                msg: "Hermanita Brigitte, conexión segura establecida. Admiro tu fuerza. ¡Disfruta tu despliegue de girasoles!", // ESCRIBE TU MENSAJE REAL AQUÍ
                bouquetX: 12,
                blueFog: 0x2a5298
            }
        };
        // ==========================================

        // --- Configuración 3D Core ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Niebla inicial (oscura)
        scene.fog = new THREE.FogExp2(0x000000, 0.05);

        // Iluminación
        const pointLight = new THREE.PointLight(0xffffff, 200, 50);
        pointLight.position.set(0, 10, 10);
        scene.add(pointLight);
        const ambientLight = new THREE.AmbientLight(0x404040, 3);
        scene.add(ambientLight);

        // --- Módulo de Creación de Girasoles ---
        // Geometrías compartidas
        const talloGeo = new THREE.CylinderGeometry(0.1, 0.1, 5, 8);
        const talloMat = new THREE.MeshStandardMaterial({ color: 0x1a4d1a });
        const centroGeo = new THREE.CircleGeometry(0.7, 32);
        const centroMat = new THREE.MeshStandardMaterial({ color: 0x3d2606, side: THREE.DoubleSide });
        const petaloGeo = new THREE.ConeGeometry(0.2, 1, 8);
        const petaloMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });

        function createSunflower(x, z, targetBouquet) {
            const group = new THREE.Group();
            // Tallo
            const tallo = new THREE.Mesh(talloGeo, talloMat);
            group.add(tallo);
            // Centro
            const centro = new THREE.Mesh(centroGeo, centroMat);
            centro.position.y = 2.5;
            centro.rotation.x = Math.PI/2;
            group.add(centro);
            // Pétalos
            for(let i=0; i<20; i++) {
                const p = new THREE.Mesh(petaloGeo, petaloMat);
                const angle = (i/20) * Math.PI * 2;
                p.position.set(Math.cos(angle)*0.9, 2.5, Math.sin(angle)*0.9);
                p.rotation.z = angle + Math.PI/2;
                group.add(p);
            }
            group.position.set(x, -1.5, z);
            
            // --- INGENIERÍA DE DESPLIEGUE (BLOOMING) ---
            // Escala inicial 0 (invisibles)
            group.scale.set(0, 0, 0); 
            // Guardamos la referencia para animar
            targetBouquet.add(group); 
            return group;
        }

        // Crear dos ramos en ubicaciones separadas (ocultos inicialmente)
        const bouquetMama = new THREE.Group();
        const bouquetHermana = new THREE.Group();
        
        for(let i=0; i<12; i++){
            createSunflower(-12 + (Math.random()-0.5)*5, (Math.random()-0.5)*4, bouquetMama);
            createSunflower(12 + (Math.random()-0.5)*5, (Math.random()-0.5)*4, bouquetHermana);
        }
        scene.add(bouquetMama, bouquetHermana);

        // --- Lógica de Cámara y Secuencia ---
        camera.position.set(0, 5, 25);
        let targetX = 0;
        let activeBouquet = null;
        let isAccessGranted = false;

        window.checkAccess = function() {
            const input = document.getElementById('passInput').value;
            const error = document.getElementById('error-msg');
            const auth = document.getElementById('auth-panel');

            if(input === CONFIG.mama.pass) {
                targetX = CONFIG.mama.bouquetX;
                activeBouquet = bouquetMama;
                executeGrantSequence(auth, CONFIG.mama);
            } else if(input === CONFIG.hermana.pass) {
                targetX = CONFIG.hermana.bouquetX;
                activeBouquet = bouquetHermana;
                executeGrantSequence(auth, CONFIG.hermana);
            } else {
                error.style.display = 'block';
                setTimeout(() => error.style.display = 'none', 2000);
            }
        }

        // Secuencia de Ingeniería de Despliegue
        function executeGrantSequence(authPanel, data) {
            authPanel.style.display = 'none'; // 1. Ocultar Login

            // 2. Cambio de Estado Estético (Azul)
            document.body.classList.add('access-granted');
            scene.fog.color.setHex(data.blueFog);

            isAccessGranted = true; // 3. Activar bandera de animación

            // 4. Mostrar Mensaje con delay para el despliegue
            const msgBox = document.getElementById('display-message');
            const txt = document.getElementById('text-content');
            txt.innerText = data.msg;
            
            setTimeout(() => {
                msgBox.style.display = 'block';
                setTimeout(() => { msgBox.style.opacity = 1; }, 50); // Fade in
            }, 3000); // 3 segundos (tiempo de vuelo + blooming)
        }

        window.resetView = function() {
            // Reversa completa de ingeniería
            targetX = 0;
            const msgBox = document.getElementById('display-message');
            msgBox.style.opacity = 0;
            setTimeout(() => { msgBox.style.display = 'none'; }, 1000);
            
            document.getElementById('auth-panel').style.display = 'block';
            document.getElementById('passInput').value = "";
            document.body.classList.remove('access-granted');
            scene.fog.color.setHex(0x000000);

            // Ocultar flores de nuevo
            isAccessGranted = false;
            if(activeBouquet) {
                activeBouquet.children.forEach(f => f.scale.set(0,0,0));
            }
            activeBouquet = null;
        }

        // --- Ciclo de Renderizado / Cinemática ---
        function animate() {
            requestAnimationFrame(animate);

            // Suavizado de cámara (Lerp)
            camera.position.x += (targetX - camera.position.x) * 0.04;
            camera.lookAt(targetX, 0, 0);

            // --- ANIMACIÓN DE DESPLIEGUE (BLOOMING) ---
            if(isAccessGranted && activeBouquet) {
                // Iteramos sobre cada flor del ramo activo y la escalamos suavemente
                activeBouquet.children.forEach(flower => {
                    // Si no ha llegado a escala 1, incrementamos
                    if(flower.scale.x < 1) {
                        const growthRate = 0.015; // Velocidad de crecimiento
                        flower.scale.x += growthRate;
                        flower.scale.y += growthRate;
                        flower.scale.z += growthRate;
                    }
                });
            }

            renderer.render(scene, camera);
        }
        animate();

        // Gestión de Resonancia
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
