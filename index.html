<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌻 Secure Flower Protocol | Telecommunications Engineering</title>
    <style>
        /* Estética de Terminal de Ingeniería */
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #0a2e0a 0%, #000000 100%); font-family: 'Courier New', monospace; color: #0f0; }
        canvas { display: block; }

        /* Capa de Telemetría */
        #terminal-ui {
            position: absolute; top: 20px; left: 20px; background: rgba(0, 20, 0, 0.8);
            padding: 15px; border: 1px solid #0f0; z-index: 100; font-size: 12px; pointer-events: none;
        }

        /* Panel de Autenticación */
        #auth-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 40, 0, 0.9); border: 2px solid #0f0; padding: 30px;
            text-align: center; z-index: 200; box-shadow: 0 0 20px #0f0; border-radius: 10px;
        }
        input {
            background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px;
            margin: 10px 0; width: 80%; text-align: center; font-family: 'Courier New', monospace;
        }
        button {
            background: #0f0; color: #000; border: none; padding: 10px 20px;
            cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        button:hover { background: #0a0; }

        /* Mensaje Emergente */
        #display-message {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 600px; background: rgba(255, 255, 255, 0.95);
            color: #052205; padding: 25px; border-radius: 15px; font-family: 'Georgia', serif;
            display: none; z-index: 150; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center; font-size: 1.1rem; line-height: 1.6;
        }
        .close-btn { color: red; cursor: pointer; float: right; font-weight: bold; }
    </style>
</head>
<body>

    <div id="terminal-ui">
        <div>> NODE: ECUADOR_SECURE_GATE</div>
        <div>> PROTOCOL: TLS_GIRASOL_V3</div>
        <div>> ENCRYPTION: AES-256-READY</div>
        <div>> STATUS: WAITING_AUTH...</div>
    </div>

    <div id="auth-panel" id="login">
        <h3>🔐 ACCESO RESTRINGIDO</h3>
        <p>Introduce tu llave de acceso:</p>
        <input type="password" id="passInput" placeholder="CONTRASEÑA">
        <br>
        <button onclick="checkAccess()">DESENCRIPTAR</button>
        <p id="error-msg" style="color: red; font-size: 10px; margin-top: 10px; display: none;">LLAVE INCORRECTA - ACCESO DENEGADO</p>
    </div>

    <div id="display-message">
        <span class="close-btn" onclick="resetView()">[X] CERRAR</span>
        <div id="text-content"></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==========================================
        // CONFIGURACIÓN DE INGENIERÍA (MODIFICA AQUÍ)
        // ==========================================
        const DATA_MAMA = {
            pass: "MAMA123", 
            msg: "Mami querida, esta es una conexión segura solo para decirte que te amo. Eres mi motor y mi orgullo. ¡Disfruta tus girasoles!",
            camX: -12
        };

        const DATA_SHEYLA = {
            pass: "SHEYLA123",
            msg: "Hermanita, acceso concedido. Gracias por ser mi mejor amiga. Estos girasoles en 3D son para ti. ¡Te quiero mucho!",
            camX: 12
        };
        // ==========================================

        // --- Configuración 3D ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Fondo Verde Tecnológico
        scene.fog = new THREE.FogExp2(0x052205, 0.05);

        // Iluminación
        const light = new THREE.PointLight(0xffffff, 150, 50);
        light.position.set(0, 10, 10);
        scene.add(light, new THREE.AmbientLight(0x404040, 2));

        // Crear Girasoles
        function createSunflower(xPos) {
            const group = new THREE.Group();
            // Tallo
            const tGeo = new THREE.CylinderGeometry(0.1, 0.1, 5);
            const tMat = new THREE.MeshStandardMaterial({ color: 0x1a4d1a });
            const tallo = new THREE.Mesh(tGeo, tMat);
            group.add(tallo);
            // Centro
            const cGeo = new THREE.CircleGeometry(0.7, 32);
            const cMat = new THREE.MeshStandardMaterial({ color: 0x3d2606, side: THREE.DoubleSide });
            const centro = new THREE.Mesh(cGeo, cMat);
            centro.position.y = 2.5;
            centro.rotation.x = Math.PI/2;
            group.add(centro);
            // Pétalos
            const pGeo = new THREE.ConeGeometry(0.2, 1, 8);
            const pMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });
            for(let i=0; i<20; i++) {
                const p = new THREE.Mesh(pGeo, pMat);
                const angle = (i/20) * Math.PI * 2;
                p.position.set(Math.cos(angle)*0.9, 2.5, Math.sin(angle)*0.9);
                p.rotation.z = angle + Math.PI/2;
                group.add(p);
            }
            group.position.x = xPos;
            group.position.y = -1;
            return group;
        }

        // Ramo Izquierdo (Mamá) y Derecho (Hermana)
        for(let i=0; i<10; i++) {
            scene.add(createSunflower(-12 + (Math.random()-0.5)*4));
            scene.add(createSunflower(12 + (Math.random()-0.5)*4));
        }

        // --- Lógica de Cámara y Control ---
        camera.position.set(0, 5, 25);
        let targetX = 0;

        window.checkAccess = function() {
            const input = document.getElementById('passInput').value;
            const error = document.getElementById('error-msg');
            const auth = document.getElementById('auth-panel');
            const msgBox = document.getElementById('display-message');
            const txt = document.getElementById('text-content');

            if(input === DATA_MAMA.pass) {
                targetX = DATA_MAMA.camX;
                txt.innerText = DATA_MAMA.msg;
                finalizeAccess(auth, msgBox);
            } else if(input === DATA_SHEYLA.pass) {
                targetX = DATA_SHEYLA.camX;
                txt.innerText = DATA_SHEYLA.msg;
                finalizeAccess(auth, msgBox);
            } else {
                error.style.display = 'block';
                setTimeout(() => error.style.display = 'none', 2000);
            }
        }

        function finalizeAccess(auth, msgBox) {
            auth.style.display = 'none';
            setTimeout(() => { msgBox.style.display = 'block'; }, 2000);
        }

        window.resetView = function() {
            targetX = 0;
            document.getElementById('display-message').style.display = 'none';
            document.getElementById('auth-panel').style.display = 'block';
            document.getElementById('passInput').value = "";
        }

        function animate() {
            requestAnimationFrame(animate);
            // Suavizado de cámara (Lerp)
            camera.position.x += (targetX - camera.position.x) * 0.03;
            camera.lookAt(targetX, 0, 0);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
